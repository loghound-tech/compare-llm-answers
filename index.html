<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Compare — Multi-Model AI Answer Comparison</title>
  <meta name="description"
    content="Compare answers from multiple AI language models side-by-side with intelligent analysis and follow-up conversations." />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="app-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="7" fill="url(#logoGrad)" />
        <path d="M8 14L12 10L16 14L20 10" stroke="white" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
        <path d="M8 18L12 14L16 18L20 14" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          opacity="0.5" />
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28">
            <stop stop-color="#6366f1" />
            <stop offset="1" stop-color="#8b5cf6" />
          </linearGradient>
        </defs>
      </svg>
      <h1>LLM Compare</h1>
    </div>
    <div class="header-controls">
      <button id="instructionsBtn" class="btn btn-ghost" title="Customize analysis instructions">⚙️ Analysis
        Prompt</button>
      <div class="api-key-group">
        <label for="apiKeyInput">API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" />
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="app-main">

    <!-- PROMPT SECTION (always at top) -->
    <section class="prompt-section">
      <div class="model-selectors">
        <div class="model-slots-dynamic" id="modelSlotsContainer">
          <!-- Dynamic model slots inserted here by JS -->
        </div>
        <div class="model-slot-actions">
          <button class="btn btn-ghost btn-add-model" id="addModelBtn" title="Add another model column">+ Model</button>
          <button class="btn btn-ghost btn-reset-models" id="resetModelsBtn" title="Reset models to defaults">↩ Reset</button>
        </div>
        <div class="analysis-model">
          <label>🔬 Analysis Model</label>
          <select id="analysisModel"></select>
        </div>
      </div>
      <div class="prompt-input-row">
        <div class="prompt-input-wrapper" id="promptDropZone">
          <textarea id="promptInput" rows="2"
            placeholder="Ask a question to compare across models… (Ctrl+Enter to send)"></textarea>
          <div class="attached-files" id="attachedFiles"></div>
          <div class="drop-overlay" id="dropOverlay">
            <span>📎 Drop files here</span>
          </div>
        </div>
        <div class="prompt-actions">
          <input type="file" id="fileInput" multiple
            accept="image/*,.pdf,.txt,.md,.csv,.json,.xml,.yaml,.yml,.py,.js,.ts,.html,.css,.java,.c,.cpp,.h,.rs,.go,.rb,.sh,.sql,.r,.jl,.log"
            hidden />
          <button id="attachBtn" class="btn btn-ghost" title="Attach files (images, text, code, etc.)">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" viewBox="0 0 24 24">
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
            </svg>
            Attach
          </button>
          <button id="sendBtn" class="btn btn-primary">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M22 2L11 13" />
              <path d="M22 2L15 22L11 13L2 9L22 2Z" />
            </svg>
            Send
          </button>
        </div>
      </div>
    </section>

    <!-- ROUNDS CONTAINER (dynamically populated) -->
    <div id="roundsContainer" class="rounds-container"></div>

    <!-- GLOBAL SAVE BAR -->
    <div class="save-all-bar" id="globalSaveBar" style="display:none">
      <button class="btn btn-ghost" onclick="copyEntireConversation()">� Copy Entire Conversation</button>
      <button class="btn btn-ghost" onclick="saveEntireConversation()">💾 Save Entire Conversation</button>
    </div>

  </main>

  <script src="app.js"></script>
</body>

</html>
