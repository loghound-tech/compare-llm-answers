<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Client — Conversation Example</title>
  <meta name="description" content="Multi-turn conversation example with conversation history persistence." />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg-base: #0b1120;
      --bg-surface: #111827;
      --bg-elevated: #1e293b;
      --border: rgba(148,163,184,0.12);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,0.25);
      --user-bg: rgba(99,102,241,0.1);
      --user-border: rgba(99,102,241,0.3);
      --assistant-bg: rgba(16,185,129,0.06);
      --assistant-border: rgba(16,185,129,0.25);
      --radius: 14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-base);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    /* ─── HEADER ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .header input, .header select {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      font-size: 0.85rem;
    }
    .header input:focus, .header select:focus {
      outline: none; border-color: var(--accent);
    }
    .header label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    /* ─── CHAT AREA ─── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    /* ─── MESSAGE BUBBLES ─── */
    .message {
      padding: 16px 20px;
      border-radius: var(--radius);
      line-height: 1.7;
      font-size: 0.92rem;
      animation: msg-in 0.3s ease;
      max-width: 85%;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-user {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message-user .msg-label {
      color: #818cf8;
    }
    .message-assistant {
      background: var(--assistant-bg);
      border: 1px solid var(--assistant-border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message-assistant .msg-label {
      color: #34d399;
    }

    .msg-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .msg-content { color: var(--text); }
    .msg-content h1, .msg-content h2, .msg-content h3 { margin: 0.8em 0 0.4em; }
    .msg-content code {
      background: rgba(99,102,241,0.12);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .msg-content pre {
      background: rgba(0,0,0,0.4);
      border-radius: var(--radius-sm);
      padding: 1rem;
      overflow-x: auto;
      margin: 0.8em 0;
    }
    .msg-content pre code { background: none; padding: 0; }
    .msg-content ul, .msg-content ol { padding-left: 1.5em; margin: 0.5em 0; }
    .msg-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1em;
      color: var(--text-muted);
      margin: 0.5em 0;
    }

    /* ─── INPUT BAR ─── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 16px 24px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .input-bar textarea {
      flex: 1;
      padding: 12px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      resize: none;
      min-height: 48px;
      max-height: 150px;
      transition: border-color 0.2s;
    }
    .input-bar textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .input-bar button {
      padding: 12px 20px;
      border-radius: var(--radius);
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-send {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }
    .btn-send:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,0.45); }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-clear {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-clear:hover { background: var(--bg-elevated); color: var(--text); }

    /* ─── LOADING ─── */
    .loading-dots {
      display: inline-flex; gap: 4px; align-items: center;
    }
    .loading-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); display: inline-block;
      animation: dot-bounce 1.4s ease-in-out infinite both;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.32s; }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.1rem;
      text-align: center;
      padding: 3rem;
    }
    .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 1rem; }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <h1>💬 LLM Conversation</h1>
  <div class="header-controls">
    <label for="hModel">Model</label>
    <select id="hModel"></select>
    <label for="hKey">Key</label>
    <input type="password" id="hKey" placeholder="sk-..." style="width:180px" />
    <button class="btn-clear" id="clearBtn" title="Clear conversation">🗑️ Clear</button>
  </div>
</header>

<!-- MESSAGES -->
<div class="chat-area" id="chatArea">
  <div class="empty-state" id="emptyState">
    <div>
      <span class="emoji">🤖</span>
      Start a conversation below.<br>
      <small>History is saved in localStorage automatically.</small>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-bar">
  <textarea id="chatInput" placeholder="Type a message… (Ctrl+Enter to send)" rows="1"></textarea>
  <button class="btn-send" id="chatSendBtn">Send</button>
</div>

<script type="module">
  import { LLMClient, ConversationManager, setupMarkdown } from './llm-client.js';

  // ── Init ──
  const client = new LLMClient({ provider: 'abacus' });
  const convo = new ConversationManager({
    persist: true,
    storageKey: 'llm_convo_example',
    systemPrompt: 'You are a helpful, friendly assistant. Answer clearly and concisely. Use markdown formatting when helpful.'
  });
  setupMarkdown();

  // ── UI refs ──
  const apiKeyInput = document.getElementById('hKey');
  const modelSelect = document.getElementById('hModel');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('chatSendBtn');
  const clearBtn = document.getElementById('clearBtn');
  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');

  // Load saved key
  apiKeyInput.value = client.apiKey;
  apiKeyInput.addEventListener('input', (e) => { client.apiKey = e.target.value; });

  // Populate models
  for (const m of client.availableModels) {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    modelSelect.appendChild(opt);
  }
  modelSelect.value = 'gpt-4o';

  // ── Render existing history ──
  function renderHistory() {
    chatArea.innerHTML = '';
    if (convo.length === 0) {
      chatArea.appendChild(emptyState);
      emptyState.style.display = '';
      return;
    }
    emptyState.style.display = 'none';
    for (const msg of convo.history) {
      appendMessage(msg.role, typeof msg.content === 'string' ? msg.content : '[Multimodal]', false);
    }
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function appendMessage(role, content, animate = true) {
    emptyState.style.display = 'none';
    const div = document.createElement('div');
    div.className = `message message-${role}`;
    if (!animate) div.style.animation = 'none';

    const label = role === 'user' ? '👤 You' : '🤖 Assistant';
    const rendered = role === 'assistant' ? marked.parse(content) : escapeHtml(content);

    div.innerHTML = `
      <div class="msg-label">${label}</div>
      <div class="msg-content">${rendered}</div>
    `;
    chatArea.appendChild(div);
    return div;
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  renderHistory();

  // ── Send message ──
  let activeStream = null;

  async function handleSend() {
    const text = chatInput.value.trim();
    if (!text || !client.hasApiKey) return;

    chatInput.value = '';
    convo.addUser(text);
    appendMessage('user', text);

    // Create placeholder for assistant
    const assistantDiv = appendMessage('assistant', '');
    assistantDiv.querySelector('.msg-content').innerHTML =
      '<div class="loading-dots"><span></span><span></span><span></span></div>';

    sendBtn.disabled = true;
    chatArea.scrollTop = chatArea.scrollHeight;

    activeStream = client.stream({
      model: modelSelect.value,
      messages: convo.messages,
      onToken: (token, fullText) => {
        assistantDiv.querySelector('.msg-content').innerHTML = marked.parse(fullText);
        chatArea.scrollTop = chatArea.scrollHeight;
      },
      onDone: (fullText) => {
        convo.addAssistant(fullText);
        sendBtn.disabled = false;
        activeStream = null;
      },
      onError: (err) => {
        assistantDiv.querySelector('.msg-content').innerHTML =
          `<span style="color:#ef4444">⚠️ ${escapeHtml(err.message)}</span>`;
        // Remove the user message from conversation if failed
        convo.undo(1);
        sendBtn.disabled = false;
        activeStream = null;
      }
    });
  }

  sendBtn.addEventListener('click', handleSend);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) handleSend();
  });

  // Auto-resize textarea
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 150) + 'px';
  });

  // Clear
  clearBtn.addEventListener('click', () => {
    if (confirm('Clear the entire conversation?')) {
      convo.clear();
      renderHistory();
    }
  });
</script>

</body>
</html>
